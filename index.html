<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selamat Seminar KP!</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --cream: #fdf6e3;
      --dark: #1a1206;
      --brown: #4a3210;
      --accent: #e07b39;
    }

    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Starfield background */
    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Card wrapper */
    .scene {
      position: relative;
      z-index: 10;
      perspective: 1200px;
    }

    .card {
      width: 420px;
      min-height: 560px;
      background: linear-gradient(145deg, #2a1a06 0%, #1a1206 40%, #2e1c08 100%);
      border-radius: 20px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      box-shadow:
        0 0 0 1px rgba(201, 168, 76, 0.1),
        0 30px 80px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(201, 168, 76, 0.2);
      padding: 50px 40px 44px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transform: rotateY(-8deg) rotateX(3deg);
      transition: transform 0.6s ease, box-shadow 0.6s ease;
      cursor: default;
    }

    .card:hover {
      transform: rotateY(0deg) rotateX(0deg) scale(1.02);
      box-shadow:
        0 0 0 1px rgba(201, 168, 76, 0.3),
        0 50px 120px rgba(0, 0, 0, 0.7),
        0 0 60px rgba(201, 168, 76, 0.08),
        inset 0 1px 0 rgba(201, 168, 76, 0.3);
    }

    /* Decorative corner ornaments */
    .ornament {
      position: absolute;
      width: 70px;
      height: 70px;
      opacity: 0.4;
    }

    .ornament svg {
      width: 100%;
      height: 100%;
    }

    .ornament.tl {
      top: 14px;
      left: 14px;
    }

    .ornament.tr {
      top: 14px;
      right: 14px;
      transform: scaleX(-1);
    }

    .ornament.bl {
      bottom: 14px;
      left: 14px;
      transform: scaleY(-1);
    }

    .ornament.br {
      bottom: 14px;
      right: 14px;
      transform: scale(-1);
    }

    /* Shimmer line */
    .shimmer-line {
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 28px;
      position: relative;
    }

    .shimmer-line::after {
      content: '✦';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--gold);
      font-size: 10px;
      animation: twinkle 2s ease-in-out infinite;
    }

    /* Cap emoji */
    .cap-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 16px;
      animation: float 3.5s ease-in-out infinite;
      filter: drop-shadow(0 4px 16px rgba(201, 168, 76, 0.4));
    }

    /* Label tag */
    .tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201, 168, 76, 0.4);
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 22px;
      background: rgba(201, 168, 76, 0.06);
    }

    /* Headline */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.18;
      margin-bottom: 6px;
      text-shadow: 0 2px 20px rgba(201, 168, 76, 0.2);
    }

    h1 span {
      font-style: italic;
      font-weight: 400;
      color: var(--gold-light);
      display: block;
      font-size: 28px;
    }

    .shimmer-line.bottom {
      margin: 24px auto 22px;
    }

    /* Body text */
    .message {
      font-size: 14.5px;
      line-height: 1.85;
      color: rgba(253, 246, 227, 0.72);
      font-weight: 300;
      max-width: 320px;
      margin: 0 auto 26px;
    }

    .message strong {
      color: var(--gold-light);
      font-weight: 500;
    }

    /* Name badge */
    .name-badge {
      display: inline-block;
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.15), rgba(201, 168, 76, 0.05));
      border: 1px solid rgba(201, 168, 76, 0.35);
      border-radius: 12px;
      padding: 10px 28px;
      color: var(--gold-light);
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-style: italic;
      margin-bottom: 30px;
      position: relative;
    }

    .name-badge::before,
    .name-badge::after {
      content: '—';
      margin: 0 6px;
      opacity: 0.5;
      font-style: normal;
    }

    /* Footer */
    .footer {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(201, 168, 76, 0.45);
    }

    /* Confetti burst button */
    .confetti-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--accent) 100%);
      color: var(--dark);
      border: none;
      padding: 11px 26px;
      border-radius: 30px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-bottom: 28px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(201, 168, 76, 0.3);
    }

    .confetti-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(201, 168, 76, 0.45);
    }

    .confetti-btn:active {
      transform: scale(0.97);
    }

    /* Confetti particles */
    .confetti-particle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 999;
      animation: confetti-fall var(--dur) ease-in forwards;
    }

    @keyframes confetti-fall {
      0% {
        transform: translate(0, 0) rotate(0deg);
        opacity: 1;
      }

      80% {
        opacity: 1;
      }

      100% {
        transform: translate(var(--tx), var(--ty)) rotate(var(--rot));
        opacity: 0;
      }
    }

    /* Animations */
    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* Entrance animation */
    .card {
      animation: reveal 1s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: rotateY(-20deg) rotateX(8deg) translateY(40px);
      }

      to {
        opacity: 1;
        transform: rotateY(-8deg) rotateX(3deg) translateY(0);
      }
    }

    /* Glow pulse behind card */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 168, 76, 0.12), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse-glow 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse-glow {

      0%,
      100% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.3);
      }
    }
  </style>
</head>

<body>

  <canvas id="stars-canvas"></canvas>

  <div class="scene">
    <div class="glow"></div>
    <div class="card" id="card">

      <!-- Corner ornaments -->
      <div class="ornament tl">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 4 L4 24 Q4 4 24 4 Z" stroke="#c9a84c" stroke-width="1.2" fill="none" />
          <path d="M4 4 L28 4 M4 4 L4 28" stroke="#c9a84c" stroke-width="0.8" opacity=".5" />
          <circle cx="4" cy="4" r="2.5" fill="#c9a84c" />
          <path d="M14 14 Q14 4 4 4" stroke="#c9a84c" stroke-width="0.6" fill="none" opacity=".4" />
        </svg>
      </div>
      <div class="ornament tr"><svg viewBox="0 0 60 60" fill="none">
          <path d="M4 4 L4 24 Q4 4 24 4 Z" stroke="#c9a84c" stroke-width="1.2" fill="none" />
          <path d="M4 4 L28 4 M4 4 L4 28" stroke="#c9a84c" stroke-width="0.8" opacity=".5" />
          <circle cx="4" cy="4" r="2.5" fill="#c9a84c" />
          <path d="M14 14 Q14 4 4 4" stroke="#c9a84c" stroke-width="0.6" fill="none" opacity=".4" />
        </svg></div>
      <div class="ornament bl"><svg viewBox="0 0 60 60" fill="none">
          <path d="M4 4 L4 24 Q4 4 24 4 Z" stroke="#c9a84c" stroke-width="1.2" fill="none" />
          <path d="M4 4 L28 4 M4 4 L4 28" stroke="#c9a84c" stroke-width="0.8" opacity=".5" />
          <circle cx="4" cy="4" r="2.5" fill="#c9a84c" />
          <path d="M14 14 Q14 4 4 4" stroke="#c9a84c" stroke-width="0.6" fill="none" opacity=".4" />
        </svg></div>
      <div class="ornament br"><svg viewBox="0 0 60 60" fill="none">
          <path d="M4 4 L4 24 Q4 4 24 4 Z" stroke="#c9a84c" stroke-width="1.2" fill="none" />
          <path d="M4 4 L28 4 M4 4 L4 28" stroke="#c9a84c" stroke-width="0.8" opacity=".5" />
          <circle cx="4" cy="4" r="2.5" fill="#c9a84c" />
          <path d="M14 14 Q14 4 4 4" stroke="#c9a84c" stroke-width="0.6" fill="none" opacity=".4" />
        </svg></div>

      <!-- <span class="cap-icon">🎓</span> -->

      <div class="tag cap-icon">Selamat &amp; Sukses</div>

      <h1>Selamat atas<span>Seminar Kerja Praktik!</span></h1>

      <div class="shimmer-line"></div>

      <div class="name-badge" id="friend-name">Zaky Taufiqurrahman<br>,<br>Wahyu Sri Aryo Pangestu<br>dan<br>Daffa Muhammad Al Fatih</div>

      <p class="message">
        Akhirnya s.kp <br />
        Semua perjuangan, begadang, dan revisi itu hari ini terbayar lunas.<br /><br />
        <strong>kerja keras</strong> dan <strong>sabar</strong>
        tidak pernah sia-sia. Selamat, mantap ndar!
      </p>

      <button class="confetti-btn" onclick="burst()">
        🎊 Rayakan!
      </button>

      <div class="shimmer-line bottom"></div>

      <p class="footer">Dari Wildan Mukmin</p>

    </div>
  </div>

  <script>
    /* ── Stars canvas ── */
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = Array.from({ length: 160 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.3,
        a: Math.random(),
        speed: Math.random() * 0.008 + 0.003,
        phase: Math.random() * Math.PI * 2
      }));
    }

    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        const alpha = 0.3 + 0.7 * ((Math.sin(t * s.speed + s.phase) + 1) / 2);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201,168,76,${alpha * 0.7})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }

    resize();
    initStars();
    requestAnimationFrame(drawStars);
    window.addEventListener('resize', () => { resize(); initStars(); });

    /* ── Confetti burst ── */
    const colors = ['#c9a84c', '#f0d080', '#e07b39', '#fff8e1', '#ff6f61', '#4fc3f7', '#aed581'];

    function burst() {
      const btn = document.querySelector('.confetti-btn');
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      for (let i = 0; i < 80; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-particle';
        const angle = Math.random() * 360;
        const dist = 120 + Math.random() * 260;
        const tx = Math.cos(angle * Math.PI / 180) * dist;
        const ty = Math.sin(angle * Math.PI / 180) * dist - 120;
        const rot = (Math.random() - 0.5) * 720 + 'deg';
        const dur = (0.7 + Math.random() * 0.9) + 's';
        const size = (6 + Math.random() * 8) + 'px';
        const color = colors[Math.floor(Math.random() * colors.length)];

        el.style.cssText = `
        left:${cx}px; top:${cy}px;
        width:${size}; height:${size};
        background:${color};
        --tx:${tx}px; --ty:${ty}px;
        --rot:${rot}; --dur:${dur};
        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), parseFloat(dur) * 1000 + 200);
      }

      /* small bounce on card */
      const card = document.getElementById('card');
      card.style.transition = 'transform 0.15s ease';
      card.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1.05)';
      setTimeout(() => {
        card.style.transition = 'transform 0.4s ease';
        card.style.transform = 'rotateY(-8deg) rotateX(3deg) scale(1)';
      }, 150);
    }

    /* ── Allow editing name on click ── */
    // const badge = document.getElementById('friend-name');
    // badge.title = 'Klik untuk ubah nama';
    // badge.addEventListener('click', () => {
    //   const current = badge.textContent.replace(/^— | —$/g, '').trim() || '';
    //   const name = prompt('Masukkan nama temanmu:', current === 'Nama Temanmu' ? '' : current);
    //   if (name !== null && name.trim() !== '') {
    //     badge.textContent = name.trim();
    //   }
    // });
  </script>
</body>
